    .booking-field input, .booking-field select, .booking-field textarea { width: 100%; min-height: 50px; padding: 12px 14px; border-radius: 16px; border: 1px solid rgba(154, 180, 214, 0.55); background: #f9fbff; color: #163255; font: inherit; }

          <p data-i18n="heroBody1">공항/골프장 이동을 위해 지역, 차량, 편도/왕복을 선택하면 예상 합계금액을 바로 확인할 수 있습니다.</p>

        </div>
        <div class="booking-visual">
          <img src="./pickup-drop-detail-hero.png" data-i18n-alt="heroImageAlt" alt="픽업 드롭 예약 대표 이미지">
        </div>
      </section>

            <div class="booking-field-grid">

            <div class="booking-field-grid">

              </div>
              <div class="booking-field">
                <label for="preferredTime" data-i18n="labelPreferredTime">희망 시간</label>
                <input id="preferredTime" name="preferredTime" type="time">
              </div>
            </div>
            <div class="booking-field-grid">
              <div class="booking-field">
                <label for="name" data-i18n="labelName">예약자명</label>
                <input id="name" name="name" type="text" required maxlength="50" data-i18n-placeholder="placeholderName">
              </div>
              <div class="booking-field">
                <label for="partySize" data-i18n="labelPartySize">탑승 인원</label>
                <select id="partySize" name="partySize" required></select>
              </div>
            </div>
            <div class="booking-field-grid">
              <div class="booking-field">
                <label for="phone" data-i18n="labelPhone">연락처</label>
                <input id="phone" name="phone" type="tel" required placeholder="010-0000-0000">
              </div>
              <div class="booking-field">
                <label for="email" data-i18n="labelEmail">이메일</label>
                <input id="email" name="email" type="email" required placeholder="you@example.com">
              </div>
            </div>
            <div class="booking-field-grid">
              <div class="booking-field">
                <label for="pickupPlace" data-i18n="labelPickupPlace">출발 장소</label>
                <input id="pickupPlace" name="pickupPlace" type="text" required data-i18n-placeholder="placeholderPickup">
              </div>
              <div class="booking-field">
                <label for="dropoffPlace" data-i18n="labelDropoffPlace">도착 장소</label>
                <input id="dropoffPlace" name="dropoffPlace" type="text" required data-i18n-placeholder="placeholderDropoff">
              </div>
            </div>
            <div class="booking-field">
              <label for="flightInfo" data-i18n="labelFlightInfo">항공편 / 티오프 정보</label>
              <input id="flightInfo" name="flightInfo" type="text" data-i18n-placeholder="placeholderFlightInfo">
            </div>
            <div class="booking-field">
              <label for="message" data-i18n="labelMessage">요청사항</label>
              <textarea id="message" name="message" data-i18n-placeholder="placeholderMessage"></textarea>
            </div>
            <label class="booking-check" for="agree">
              <input id="agree" name="agree" type="checkbox" required>
              <span data-i18n="agreeText">예약 확인을 위해 입력한 연락처로 운영팀이 안내드리는 것에 동의합니다.</span>
            </label>
            <button class="booking-submit" id="submitButton" type="submit" data-i18n="submitIdle">예약 신청하기</button>
            <div class="booking-status" id="bookingStatus" hidden></div>
          </form>
        </div>

        <aside class="booking-layout-side">
          <section class="booking-summary-card">
            <h3 data-i18n="summaryTitle">예상 금액 요약</h3>
            <div class="booking-total-box">
              <p id="summaryLabel"></p>

            </div>
            <ul id="summaryList"></ul>
          </section>
          <section class="booking-guide">
            <h3 data-i18n="guideTitle">지역 구분 안내</h3>
            <ul id="regionGuideList"></ul>
          </section>
        </aside>

        { id: "custom-naha-central", region: "centralArea", kr: "나하시내 ↔ 중부", jp: "那覇市内 ↔ 中部", hintKr: "나하시내와 중부권 이동 상담용", hintJp: "那覇市内と中部エリア移動の相談用", pickupKr: "직접 입력", pickupJp: "直接入力", dropoffKr: "직접 입력", dropoffJp: "直接入力" },
        { id: "custom-central-onna", region: "onnaSouth", kr: "중부 ↔ 온나손", jp: "中部 ↔ 恩納村", hintKr: "중부와 온나손 이동 상담용", hintJp: "中部と恩納村の移動相談用", pickupKr: "직접 입력", pickupJp: "直接入力", dropoffKr: "직접 입력", dropoffJp: "直接入力" },
        { id: "custom-nago-north", region: "northArea", kr: "나고 ↔ 북부", jp: "名護 ↔ 北部", hintKr: "나고와 북부권 이동 상담용", hintJp: "名護と北部エリア移動の相談用", pickupKr: "직접 입력", pickupJp: "直接入力", dropoffKr: "직접 입력", dropoffJp: "直接入力" },
        { id: "custom-direct", region: "nahaCity", kr: "직접 구간 입력 상담", jp: "直接区間入力相談", hintKr: "출발지와 도착지를 직접 입력해 상담 가능합니다.", hintJp: "出発地と到着地を直接入力して相談できます。", pickupKr: "직접 입력", pickupJp: "直接入力", dropoffKr: "직접 입력", dropoffJp: "直接入力" }
      ]
    };

    const SERVICE_CATEGORY_ORDER = ["airportPickup", "airportDrop", "golfPickup", "golfDrop", "airportGolfLink", "customTransfer"];
    const VEHICLE_ORDER = ["alphard", "hiace"];
    const TRIP_ORDER = ["oneWay", "roundTrip"];

    const descriptionMeta = document.querySelector('meta[name="description"]');
    const langButtons = Array.from(document.querySelectorAll("[data-lang-button]"));
    const form = document.getElementById("transferBookingForm");
    const serviceCategory = document.getElementById("serviceCategory");
    const tripType = document.getElementById("tripType");
    const vehicleType = document.getElementById("vehicleType");
    const region = document.getElementById("region");
    const baseFare = document.getElementById("baseFare");
    const totalFare = document.getElementById("totalFare");
    const regionDetail = document.getElementById("regionDetail");
    const detailZone = document.getElementById("detailZone");
    const routeHint = document.getElementById("routeHint");
    const pickupPlace = document.getElementById("pickupPlace");
    const dropoffPlace = document.getElementById("dropoffPlace");
    const submitButton = document.getElementById("submitButton");
    const bookingStatus = document.getElementById("bookingStatus");
    const summaryLabel = document.getElementById("summaryLabel");
    const summaryTotal = document.getElementById("summaryTotal");
    const summaryMeta = document.getElementById("summaryMeta");
    const summaryList = document.getElementById("summaryList");
    const regionGuideList = document.getElementById("regionGuideList");

    function currentLanguage() {
      return window.localStorage.getItem(LANGUAGE_STORAGE_KEY) === "jp" ? "jp" : "kr";
    }

    function getText(key) {
      return TEXT[currentLanguage()][key];
    }

    function regionName(code, lang = currentLanguage()) {
      return REGION_DATA[code][lang === "jp" ? "jp" : "kr"];
    }

    function regionDescription(code, lang = currentLanguage()) {
      return REGION_DATA[code][lang === "jp" ? "detailJp" : "detailKr"];
    }

    function currency(value, lang = currentLanguage()) {
      const amount = new Intl.NumberFormat(lang === "jp" ? "ja-JP" : "ko-KR").format(value);
      return lang === "jp" ? `¥${amount}` : `${amount}엔`;
    }

    function getSelectedDetail() {
      const detailList = DETAIL_OPTIONS[serviceCategory.value] || [];
      return detailList.find((item) => item.id === detailZone.value) || null;
    }

    function populateServiceCategories() {
      const previous = serviceCategory.value || SERVICE_CATEGORY_ORDER[0];
      serviceCategory.innerHTML = SERVICE_CATEGORY_ORDER.map((code) => {
        const selected = code === previous ? " selected" : "";
        return `<option value="${code}"${selected}>${TEXT[currentLanguage()].serviceCategories[code]}</option>`;
      }).join("");
    }

    function populateTripTypes() {
      const previous = tripType.value || "oneWay";
      tripType.innerHTML = TRIP_ORDER.map((code) => {
        const selected = code === previous ? " selected" : "";
        return `<option value="${code}"${selected}>${TEXT[currentLanguage()].tripTypes[code]}</option>`;
      }).join("");
    }

    function populateVehicleTypes() {
      const previous = vehicleType.value || "alphard";
      vehicleType.innerHTML = VEHICLE_ORDER.map((code) => {
        const selected = code === previous ? " selected" : "";
        return `<option value="${code}"${selected}>${TEXT[currentLanguage()].vehicleTypes[code]}</option>`;
      }).join("");
    }

    function populateRegions() {
      const previous = region.value || "nahaCity";
      region.innerHTML = Object.keys(REGION_DATA).map((code) => {
        const selected = code === previous ? " selected" : "";
        return `<option value="${code}"${selected}>${regionName(code)}</option>`;
      }).join("");
    }

    function populatePartySizes() {
      const currentValue = form.partySize.value;
      const options = [`<option value="">${getText("partyPlaceholder")}</option>`]
        .concat(TEXT[currentLanguage()].partySizes.map((item) => {
          const selected = item.value === currentValue ? " selected" : "";
          return `<option value="${item.value}"${selected}>${item.label}</option>`;
        }));
      form.partySize.innerHTML = options.join("");
      form.partySize.value = currentValue || "";
    }

    function populateDetailZones() {
      const detailList = DETAIL_OPTIONS[serviceCategory.value] || [];
      const previous = detailList.some((item) => item.id === detailZone.value) ? detailZone.value : "";
      detailZone.innerHTML = [`<option value="">${getText("detailPlaceholder")}</option>`]
        .concat(detailList.map((item) => {
          const label = currentLanguage() === "jp" ? item.jp : item.kr;
          const selected = item.id === previous ? " selected" : "";
          return `<option value="${item.id}"${selected}>${label}</option>`;
        })).join("");
      detailZone.value = previous;
    }

    function syncRegionDetails() {
      const detail = getSelectedDetail();
      if (detail) {
        region.value = detail.region;
        routeHint.value = currentLanguage() === "jp" ? detail.hintJp : detail.hintKr;
        if (!pickupPlace.value) {
          pickupPlace.placeholder = currentLanguage() === "jp" ? detail.pickupJp : detail.pickupKr;
        }
        if (!dropoffPlace.value) {
          dropoffPlace.placeholder = currentLanguage() === "jp" ? detail.dropoffJp : detail.dropoffKr;
        }
      } else {
        routeHint.value = getText("routeCustomHint");
        pickupPlace.placeholder = getText("placeholderPickup");
        dropoffPlace.placeholder = getText("placeholderDropoff");
      }
      regionDetail.value = regionDescription(region.value);
    }

    function updateFare() {
      const selectedRegion = REGION_DATA[region.value];
      const selectedVehicle = vehicleType.value || "alphard";
      const oneWayFare = selectedRegion[selectedVehicle];
      const total = tripType.value === "roundTrip" ? oneWayFare * 2 : oneWayFare;
      baseFare.value = currency(oneWayFare);
      totalFare.value = currency(total);
      summaryLabel.textContent = `${regionName(region.value)} · ${TEXT[currentLanguage()].vehicleTypes[selectedVehicle]}`;
      summaryTotal.textContent = currency(total);
      summaryMeta.textContent = tripType.value === "roundTrip" ? getText("summaryMetaRoundTrip") : getText("summaryMetaOneWay");
      regionDetail.value = regionDescription(region.value);
      summaryList.innerHTML = [
        getText("summaryBullet1"),
        getText("summaryBullet2"),
        getText("summaryBullet3")
      ].map((item) => `<li>${item}</li>`).join("");
    }

    function renderRegionGuide() {
      regionGuideList.innerHTML = Object.keys(REGION_DATA).map((code) => {
        return `<li><strong>${regionName(code)}</strong> : ${regionDescription(code)}</li>`;
      }).join("");
    }

    function applyStaticText() {
      const lang = currentLanguage();
      const copy = TEXT[lang];
      document.documentElement.lang = lang === "jp" ? "ja" : "ko";
      document.documentElement.setAttribute("data-lang", lang);
      document.title = copy.pageTitle;
      if (descriptionMeta) {
        descriptionMeta.content = copy.metaDescription;
      }

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.dataset.i18n;
        if (key in copy) {
          element.textContent = copy[key];
        }
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
        const key = element.dataset.i18nPlaceholder;
        if (key in copy) {
          element.placeholder = copy[key];
        }
      });

      document.querySelectorAll("[data-i18n-alt]").forEach((element) => {
        const key = element.dataset.i18nAlt;
        if (key in copy) {
          element.alt = copy[key];
        }
      });

      document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
        const key = element.dataset.i18nAriaLabel;
        if (key in copy) {
          element.setAttribute("aria-label", copy[key]);
        }
      });

      langButtons.forEach((button) => {
        const active = button.dataset.langButton === lang;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", String(active));
      });

      populateServiceCategories();
      populateTripTypes();
      populateVehicleTypes();
      populateRegions();
      populatePartySizes();
      populateDetailZones();
      syncRegionDetails();
      updateFare();
      renderRegionGuide();
    }

    function initializeDefaults() {
      populateServiceCategories();
      populateTripTypes();
      populateVehicleTypes();
      populateRegions();
      populatePartySizes();
      serviceCategory.value = "airportPickup";
      tripType.value = "oneWay";
      vehicleType.value = "alphard";
      region.value = "nahaCity";
      populateDetailZones();
      detailZone.selectedIndex = 1;
      syncRegionDetails();
      updateFare();
      renderRegionGuide();
    }

    function showStatus(text, isError) {
      bookingStatus.hidden = false;
      bookingStatus.textContent = text;
      bookingStatus.classList.toggle("is-error", Boolean(isError));
    }

    initializeDefaults();
    applyStaticText();

    serviceCategory.addEventListener("change", () => {
      populateDetailZones();
      syncRegionDetails();
      updateFare();
    });

    detailZone.addEventListener("change", () => {
      syncRegionDetails();
      updateFare();
    });

    region.addEventListener("change", () => {
      regionDetail.value = regionDescription(region.value);
      updateFare();
    });

    tripType.addEventListener("change", updateFare);
    vehicleType.addEventListener("change", updateFare);

    langButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const nextLanguage = button.dataset.langButton;
        if (!nextLanguage || nextLanguage === currentLanguage()) {
          return;
        }
        window.localStorage.setItem(LANGUAGE_STORAGE_KEY, nextLanguage);
        applyStaticText();
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      bookingStatus.hidden = true;

      if (!form.reportValidity()) {
        showStatus(getText("statusValidation"), true);
        return;
      }

      if (window.location.protocol === "file:") {
        showStatus(getText("statusFile"), true);
        return;
      }

      const selectedDetail = getSelectedDetail();
      const payload = {
        inquiryType: "reservation",
        serviceType: "other",
        title: `[픽/드랍] ${selectedDetail ? selectedDetail.kr : REGION_DATA[region.value].kr}`,
        preferredDate: form.preferredDate.value,
        name: form.name.value.trim(),
        phone: form.phone.value.trim(),
        email: form.email.value.trim(),
        website: form.website.value.trim(),
        agree: form.agree.checked,
        message: [
          TEXT.kr.inquiryPrefix,
          `서비스 유형: ${TEXT.kr.serviceCategories[serviceCategory.value]}`,
          `이용 구간: ${TEXT.kr.tripTypes[tripType.value]}`,
          `차량: ${TEXT.kr.vehicleTypes[vehicleType.value]}`,
          `이동 지역: ${REGION_DATA[region.value].kr}`,
          `상세 구간: ${selectedDetail ? selectedDetail.kr : "-"}`,
          `구간 예시: ${selectedDetail ? selectedDetail.hintKr : "-"}`,
          `편도 기준 요금: ${baseFare.value}`,
          `예상 합계금액: ${totalFare.value}`,
          `희망 날짜: ${form.preferredDate.value}`,
          `희망 시간: ${form.preferredTime.value || "-"}`,
          `탑승 인원: ${form.partySize.value}`,
          `출발 장소: ${form.pickupPlace.value.trim()}`,
          `도착 장소: ${form.dropoffPlace.value.trim()}`,
          `항공편 / 티오프 정보: ${form.flightInfo.value.trim() || "-"}`,
          `요청사항: ${form.message.value.trim() || "-"}`
        ].join("\n")
      };

      submitButton.disabled = true;
      submitButton.textContent = getText("submitLoading");

      try {
        const response = await fetch("/.netlify/functions/contact-inquiries", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.message || getText("statusError"));
        }

        showStatus(`${getText("statusSuccess")}${result.inquiry?.inquiryCode || "-"}`, false);
        form.reset();
        serviceCategory.value = "airportPickup";
        tripType.value = "oneWay";
        vehicleType.value = "alphard";
        region.value = "nahaCity";
        populateDetailZones();
        detailZone.selectedIndex = 1;
        populatePartySizes();
        syncRegionDetails();
        updateFare();
      } catch (error) {
        showStatus(error.message || getText("statusError"), true);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = getText("submitIdle");
      }
    });
  </script>
</body>
</html>
